<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="checker" width="52" height="52" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="#d7d7d7"/>
      <rect x="26" y="26" width="26" height="26" fill="#d7d7d7"/>
      <rect x="26" width="26" height="26" fill="#adadad"/>
      <rect y="26" width="26" height="26" fill="#adadad"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#141518" flood-opacity=".22"/>
    </filter>
    <filter id="glyphShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#141518" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#checker)"/>
  <rect x="70" y="70" width="1060" height="490" rx="42" fill="#fff" opacity=".94" filter="url(#softShadow)"/>
  <text x="124" y="190" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="96" font-weight="800" fill="#141518">SVGlance</text>
  <text x="128" y="254" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="500" fill="#383d45">Make invisible white SVG previews visible on macOS.</text>
  <g transform="translate(128 330)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" fill="#6b717b">BEFORE</text>
    <rect x="0" y="24" width="360" height="132" rx="24" fill="#fff" stroke="#ddd"/>
    <g transform="translate(42 56)">
      <rect width="70" height="70" rx="14" fill="#fff" stroke="#ececec"/>
      <circle cx="35" cy="35" r="24" fill="#fff"/>
    </g>
    <g transform="translate(146 56)">
      <rect width="70" height="70" rx="14" fill="#fff" stroke="#ececec"/>
      <rect x="18" y="18" width="34" height="34" rx="11" fill="#f5f3ee"/>
    </g>
    <g transform="translate(250 56)">
      <rect width="70" height="70" rx="14" fill="#fff" stroke="#ececec"/>
      <circle cx="35" cy="35" r="24" fill="none" stroke="#141518" stroke-width="7"/>
    </g>
  </g>
  <g transform="translate(568 330)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" fill="#e97924">AFTER SVGLANCE</text>
    <rect x="0" y="24" width="430" height="132" rx="24" fill="#fff" stroke="#ddd"/>
    <g transform="translate(40 56)">
      <rect width="70" height="70" rx="14" fill="url(#checker)" stroke="#d0d0d0"/>
      <circle cx="35" cy="35" r="24" fill="#fff" filter="url(#glyphShadow)"/>
    </g>
    <g transform="translate(148 56)">
      <rect width="70" height="70" rx="14" fill="url(#checker)" stroke="#d0d0d0"/>
      <rect x="18" y="18" width="34" height="34" rx="11" fill="#f5f3ee" filter="url(#glyphShadow)"/>
    </g>
    <g transform="translate(256 56)">
      <rect width="70" height="70" rx="14" fill="url(#checker)" stroke="#d0d0d0"/>
      <circle cx="35" cy="35" r="24" fill="none" stroke="#141518" stroke-width="7" filter="url(#glyphShadow)"/>
    </g>
    <g transform="translate(344 56)">
      <circle cx="35" cy="35" r="35" fill="#fff2e8"/>
      <circle cx="35" cy="35" r="22" fill="#e97924"/>
    </g>
  </g>
</svg>
