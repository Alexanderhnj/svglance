<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#d7d7d7">
  <title>Downloading SVGlance</title>
  <link rel="canonical" href="https://svglance.vercel.app/download">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #141518;
      --muted: #626973;
      --line: rgba(20, 21, 24, 0.12);
      --accent: #e97924;
      --checker-light: #d7d7d7;
      --checker-dark: #adadad;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--ink);
      background-color: var(--checker-light);
      background-image: conic-gradient(
        var(--checker-light) 25%,
        var(--checker-dark) 0 50%,
        var(--checker-light) 0 75%,
        var(--checker-dark) 0
      );
      background-size: 44px 44px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(460px, 100%);
      padding: 34px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 28px 80px rgba(20, 21, 24, 0.22);
      text-align: center;
    }

    img {
      width: 76px;
      height: 76px;
      display: block;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    a {
      color: var(--ink);
      font-weight: 750;
      text-decoration-color: rgba(20, 21, 24, 0.32);
      text-underline-offset: 3px;
    }

    .pill {
      width: fit-content;
      margin: 18px auto 0;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(233, 121, 36, 0.22);
      background: #fff2e8;
      color: #8c4a18;
      font-size: 12px;
      font-weight: 750;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/app-icon.png" alt="">
    <h1>Preparing SVGlance</h1>
    <p>Your download should start automatically. If it does not, <a id="download-link" href="https://github.com/Alexanderhnj/svglance/releases/latest/download/SVGlance.dmg">download the DMG from GitHub</a>.</p>
    <div class="pill">Unsigned beta build</div>
  </main>
  <script>
    const downloadURL = "https://github.com/Alexanderhnj/svglance/releases/latest/download/SVGlance.dmg";

    window.va?.("event", {
      name: "download_started",
      data: {
        source: "download_page",
        app: "SVGlance"
      }
    });

    window.setTimeout(() => {
      window.location.href = downloadURL;
    }, 450);
  </script>
</body>
</html>
