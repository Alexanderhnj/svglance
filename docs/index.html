<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVGlance</title>
  <meta name="description" content="A small macOS app that makes SVG files visible in Finder and preview windows.">
  <meta property="og:title" content="SVGlance">
  <meta property="og:description" content="Make white and light SVGs visible on macOS.">
  <meta property="og:image" content="/assets/app-icon.png">
  <meta name="theme-color" content="#c8c8c8">
  <style>
    :root {
      color-scheme: light;
      --ink: #141518;
      --soft-ink: #3b3f46;
      --muted: #6b717b;
      --line: rgba(20, 21, 24, 0.12);
      --glass: rgba(255, 255, 255, 0.82);
      --glass-strong: rgba(255, 255, 255, 0.94);
      --accent: #ff9734;
      --accent-dark: #d66700;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(45deg, #c8c8c8 25%, transparent 25%) 0 0 / 40px 40px,
        linear-gradient(45deg, transparent 75%, #c8c8c8 75%) 0 0 / 40px 40px,
        linear-gradient(45deg, transparent 75%, #a0a0a0 75%) 20px 20px / 40px 40px,
        linear-gradient(45deg, #a0a0a0 25%, transparent 25%) 20px 20px / 40px 40px,
        #b5b5b5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.78), transparent 30%),
        radial-gradient(circle at 74% 78%, rgba(255, 151, 52, 0.28), transparent 34%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      position: relative;
    }

    .page {
      width: min(1060px, 100%);
      min-height: min(670px, calc(100vh - 44px));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: clamp(30px, 5vw, 64px);
      align-items: center;
      padding: clamp(30px, 6vw, 78px);
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 30px;
      background: var(--glass);
      box-shadow: 0 34px 100px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(22px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--glass-strong);
      border: 1px solid var(--line);
      color: var(--soft-ink);
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 151, 52, 0.18);
    }

    h1 {
      margin: 28px 0 0;
      font-size: clamp(56px, 9vw, 112px);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .lede {
      margin: 24px 0 0;
      max-width: 650px;
      color: var(--soft-ink);
      font-size: clamp(19px, 2vw, 24px);
      line-height: 1.38;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 18px;
      border-radius: 9px;
      border: 1px solid transparent;
      font-weight: 750;
      white-space: nowrap;
    }

    .primary {
      color: white;
      background: var(--ink);
      box-shadow: 0 12px 24px rgba(20, 21, 24, 0.22);
    }

    .secondary {
      color: var(--ink);
      background: var(--glass-strong);
      border-color: var(--line);
    }

    .links {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .links a {
      border-bottom: 1px solid rgba(107, 113, 123, 0.42);
    }

    .device {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .icon-frame {
      width: min(280px, 100%);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 52px;
      background:
        linear-gradient(45deg, #c8c8c8 25%, transparent 25%) 0 0 / 44px 44px,
        linear-gradient(45deg, transparent 75%, #c8c8c8 75%) 0 0 / 44px 44px,
        linear-gradient(45deg, transparent 75%, #a0a0a0 75%) 22px 22px / 44px 44px,
        linear-gradient(45deg, #a0a0a0 25%, transparent 25%) 22px 22px / 44px 44px,
        #b3b3b3;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66), 0 24px 48px rgba(0, 0, 0, 0.22);
    }

    .mark {
      width: 72%;
      height: 72%;
      border-radius: 36px;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.22));
    }

    .caption {
      width: min(280px, 100%);
      margin: 0;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--glass-strong);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.38;
      text-align: center;
    }

    .caption strong {
      color: var(--accent-dark);
    }

    @media (max-width: 780px) {
      main {
        padding: 14px;
      }

      .page {
        min-height: calc(100vh - 28px);
        grid-template-columns: 1fr;
        align-content: center;
        padding: 30px 22px;
      }

      .device {
        order: -1;
      }

      .icon-frame {
        width: 172px;
        border-radius: 34px;
      }

      .caption {
        display: none;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-label="SVGlance download">
      <div>
        <div class="eyebrow"><span class="dot"></span> Free macOS utility</div>
        <h1>SVGlance</h1>
        <p class="lede">Make white and light SVGs visible on macOS with a checkerboard viewer, transparent PNG export, and Finder icon treatment.</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/Alexanderhnj/svglance/releases/latest/download/SVGlance.dmg">Download DMG</a>
          <a class="button secondary" href="https://github.com/Alexanderhnj/svglance">Source code</a>
        </div>
        <nav class="links" aria-label="Social links">
          <a href="https://github.com/Alexanderhnj">GitHub</a>
          <a href="https://x.com/TheDevDesign">X</a>
          <a href="https://github.com/Alexanderhnj/svglance/blob/main/PRIVACY.md">Privacy</a>
        </nav>
      </div>
      <div class="device" aria-hidden="true">
        <div class="icon-frame">
          <img class="mark" src="assets/app-icon.png" alt="">
        </div>
        <p class="caption"><strong>Unsigned preview build.</strong> macOS may show a warning until the app is Developer ID notarized.</p>
      </div>
    </section>
  </main>
</body>
</html>
